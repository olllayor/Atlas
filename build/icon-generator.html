<!DOCTYPE html>
<html>
<head>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      display: flex; 
      justify-content: center; 
      align-items: center; 
      min-height: 100vh; 
      background: #1a1a1a;
    }
    svg { display: block; }
  </style>
</head>
<body>
  <svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
    <defs>
      <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" style="stop-color:#6366f1"/>
        <stop offset="100%" style="stop-color:#4f46e5"/>
      </linearGradient>
      <linearGradient id="bubble" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" style="stop-color:#ffffff"/>
        <stop offset="100%" style="stop-color:#e8e8ff"/>
      </linearGradient>
      <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
        <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#000" flood-opacity="0.2"/>
      </filter>
    </defs>
    
    <!-- Rounded square background -->
    <rect x="0" y="0" width="1024" height="1024" rx="226" fill="url(#bg)"/>
    
    <!-- Inner subtle gradient overlay -->
    <rect x="0" y="0" width="1024" height="1024" rx="226" fill="url(#inner)" opacity="0.1"/>
    
    <!-- Chat bubble -->
    <g filter="url(#shadow)">
      <path d="M256 384 
               Q256 320 320 320 
               L704 320 
               Q768 320 768 384 
               L768 576 
               Q768 640 704 640 
               L512 640 
               L384 768 
               L384 640 
               L320 640 
               Q256 640 256 576 
               Z" 
            fill="url(#bubble)"/>
    </g>
    
    <!-- CC Text -->
    <text x="512" y="540" 
          font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', sans-serif" 
          font-size="180" 
          font-weight="700" 
          fill="#4f46e5" 
          text-anchor="middle" 
          dominant-baseline="middle" 
          letter-spacing="-4">CC</text>
  </svg>
</body>
</html>
