<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <!-- Background gradient - modern indigo -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="50%" style="stop-color:#4f46e5"/>
      <stop offset="100%" style="stop-color:#4338ca"/>
    </linearGradient>
    
    <!-- Subtle inner glow -->
    <radialGradient id="innerGlow" cx="50%" cy="40%" r="60%">
      <stop offset="0%" style="stop-color:#818cf8;stop-opacity:0.4"/>
      <stop offset="100%" style="stop-color:#4338ca;stop-opacity:0"/>
    </radialGradient>
    
    <!-- Chat bubble gradient -->
    <linearGradient id="bubbleGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#f1f5f9"/>
    </linearGradient>
    
    <!-- Shadow for bubble -->
    <filter id="bubbleShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="24" flood-color="#1e1b4b" flood-opacity="0.25"/>
    </filter>
    
    <!-- Text shadow -->
    <filter id="textShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#4338ca" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <!-- Background rounded square -->
  <rect x="0" y="0" width="1024" height="1024" rx="226" fill="url(#bgGrad)"/>
  
  <!-- Inner glow overlay -->
  <rect x="0" y="0" width="1024" height="1024" rx="226" fill="url(#innerGlow)"/>
  
  <!-- Subtle top highlight -->
  <rect x="0" y="0" width="1024" height="512" rx="226" fill="white" opacity="0.05"/>
  
  <!-- Chat bubble -->
  <g filter="url(#bubbleShadow)">
    <path d="M260 360 
             Q260 300 320 300 
             L704 300 
             Q764 300 764 360 
             L764 560 
             Q764 620 704 620 
             L520 620 
             L400 740 
             L400 620 
             L320 620 
             Q260 620 260 560 
             Z" 
          fill="url(#bubbleGrad)"/>
  </g>
  
  <!-- CC Text -->
  <text x="512" y="510" 
        font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', sans-serif" 
        font-size="160" 
        font-weight="800" 
        fill="#4338ca" 
        text-anchor="middle" 
        dominant-baseline="middle" 
        letter-spacing="-6"
        filter="url(#textShadow)">CC</text>
</svg>
