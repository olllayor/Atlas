name: Feature
description: Suggest a new feature or improvement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature. CheapChat v1 has a narrow scope, so please consider whether this fits the current product scope before submitting.
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the user problem or pain point this feature would address.
      placeholder: "I'm frustrated when..."
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What would you like to see happen?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Have you considered any alternative solutions or workarounds?
  - type: dropdown
    id: scope
    attributes:
      label: Does this fit v1 scope?
      description: v1 scope: single-user desktop, local storage, manual model selection, text chat only.
      options:
        - Yes, this is in scope
        - Maybe, needs discussion
        - No, this is out of scope for v1
    validations:
      required: true
