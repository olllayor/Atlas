name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    name: Release on macOS
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.11.1

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Prepare Apple API key
        if: ${{ secrets.APPLE_API_KEY != '' && secrets.APPLE_API_KEY_ID != '' && secrets.APPLE_API_ISSUER != '' }}
        shell: bash
        run: |
          KEY_PATH="$RUNNER_TEMP/AuthKey_${{ secrets.APPLE_API_KEY_ID }}.p8"
          printf '%s' '${{ secrets.APPLE_API_KEY }}' > "$KEY_PATH"
          {
            echo "APPLE_API_KEY=$KEY_PATH"
            echo "APPLE_API_KEY_ID=${{ secrets.APPLE_API_KEY_ID }}"
            echo "APPLE_API_ISSUER=${{ secrets.APPLE_API_ISSUER }}"
          } >> "$GITHUB_ENV"

      - name: Package macOS artifacts
        run: pnpm package
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}

      - name: Upload artifacts
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          make_latest: ${{ contains(github.ref_name, '-') && 'false' || 'true' }}
          generate_release_notes: true
          files: |
            release/CheapChat-*.dmg
            release/CheapChat-*.zip
            release/CheapChat-*.dmg.blockmap
            release/CheapChat-*.zip.blockmap
            release/latest-mac.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
