name: Pull Request
description: Submit a pull request
title: "[PR]: "
labels: []
body:
  - type: markdown
    attributes:
      value: |
        Thanks for contributing! Please fill out the sections below.
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What does this PR do? Explain the user-visible change.
    validations:
      required: true
  - type: textarea
    id: testing
    attributes:
      label: How did you test this?
      description: Describe how you verified the change works.
    validations:
      required: true
  - type: dropdown
    id: type
    attributes:
      label: Type of change
      options:
        - Bug fix
        - New feature
        - Documentation update
        - Build / CI improvement
        - Refactor
        - Performance
    validations:
      required: true
  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I have read the contributing guidelines
          required: true
        - label: I have verified this does not introduce regressions in existing functionality
          required: true
        - label: I have kept the scope narrow and avoided unrelated changes
          required: true
  - type: textarea
    id: platform
    attributes:
      label: Platform-specific assumptions
      description: Does this change make any platform-specific assumptions? (macOS, Windows, Linux)
      placeholder: "None"
